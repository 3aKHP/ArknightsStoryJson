name: Sync Upstream and Release

on:
  schedule:
    # Run daily at UTC 04:00
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream latest commit SHA
        id: upstream
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/050644zf/ArknightsStoryJson.git HEAD | cut -f1)
          echo "sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${UPSTREAM_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "tag=upstream-${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "Upstream SHA: ${UPSTREAM_SHA}"

      - name: Get latest release tag from this fork
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: ${TAG}"

      - name: Check if update is needed
        id: check
        run: |
          UPSTREAM_SHA="${{ steps.upstream.outputs.sha }}"
          LATEST_TAG="${{ steps.latest_release.outputs.tag }}"
          # The release tag is "upstream-<SHA>"; strip prefix for comparison
          LATEST_SHA="${LATEST_TAG#upstream-}"
          if [ "${LATEST_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "No update needed: fork release tag matches upstream SHA."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: upstream=${UPSTREAM_SHA}, latest_release_sha=${LATEST_SHA}"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch upstream zh_CN via sparse checkout
        if: steps.check.outputs.needed == 'true'
        run: |
          # Add upstream remote and fetch only zh_CN directory via sparse checkout
          git remote add upstream https://github.com/050644zf/ArknightsStoryJson.git
          git fetch upstream main --depth=1

          # Export upstream zh_CN tree to a temporary directory
          mkdir -p /tmp/upstream_zh_CN
          git checkout upstream/main -- zh_CN
          cp -r zh_CN /tmp/upstream_zh_CN/zh_CN

      - name: Create zh_CN.zip (excluding user-generated files)
        if: steps.check.outputs.needed == 'true'
        run: |
          cd /tmp/upstream_zh_CN

          # Create zip while excluding:
          #   ProcessStep*.py
          #   Processed_Stories/ directories
          #   *_FULL.jsonl files
          #   *_FULL.md files
          #   *.zip files
          zip -r /tmp/zh_CN.zip zh_CN \
            --exclude "*/ProcessStep*.py" \
            --exclude "*/Processed_Stories/*" \
            --exclude "*_FULL.jsonl" \
            --exclude "*_FULL.md" \
            --exclude "*.zip"

          echo "Created zh_CN.zip:"
          ls -lh /tmp/zh_CN.zip

      - name: Create GitHub Release and upload asset
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA="${{ steps.upstream.outputs.sha }}"
          RELEASE_TAG="${{ steps.upstream.outputs.tag }}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          RELEASE_NAME="Story Data ${RELEASE_DATE}"

          printf 'Upstream commit: `%s`\n\nSynced from \x5B050644zf/ArknightsStoryJson\x5D(https://github.com/050644zf/ArknightsStoryJson) on %s.\n\nThis release contains the `zh_CN/` story data directory, excluding user-generated processing files.\n' \
            "${UPSTREAM_SHA}" "${RELEASE_DATE}" > /tmp/release_notes.md

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --title "${RELEASE_NAME}" \
            --notes-file /tmp/release_notes.md \
            /tmp/zh_CN.zip
